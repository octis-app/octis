steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'northamerica-northeast1-docker.pkg.dev/igneous-aleph-468015-d8/octis/octis:latest'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'northamerica-northeast1-docker.pkg.dev/igneous-aleph-468015-d8/octis/octis:latest'

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'octis'
      - '--image=northamerica-northeast1-docker.pkg.dev/igneous-aleph-468015-d8/octis/octis:latest'
      - '--region=northamerica-northeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-secrets=CLERK_SECRET_KEY=octis-clerk-secret:latest,GATEWAY_TOKEN=octis-gateway-token:latest,PG_PASSWORD=octis-pg-password:latest,GATEWAY_URL=octis-gateway-url:latest'

images:
  - 'northamerica-northeast1-docker.pkg.dev/igneous-aleph-468015-d8/octis/octis:latest'
