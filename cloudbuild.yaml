steps:
  # Build the Docker image (includes Vite build)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'northamerica-northeast1-docker.pkg.dev/igneous-aleph-468015-d8/octis/octis:latest'
      - '--build-arg'
      - 'VITE_CLERK_PUBLISHABLE_KEY=pk_test_b3JnYW5pYy1oaXBwby0xNC5jbGVyay5hY2NvdW50cy5kZXYk'
      - '--build-arg'
      - 'VITE_API_URL='
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'northamerica-northeast1-docker.pkg.dev/igneous-aleph-468015-d8/octis/octis:latest'

  # Deploy to Cloud Run (env vars already set on the service, just update the image)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'octis'
      - '--image=northamerica-northeast1-docker.pkg.dev/igneous-aleph-468015-d8/octis/octis:latest'
      - '--region=northamerica-northeast1'
      - '--platform=managed'
      - '--allow-unauthenticated'

images:
  - 'northamerica-northeast1-docker.pkg.dev/igneous-aleph-468015-d8/octis/octis:latest'
